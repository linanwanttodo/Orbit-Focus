name = "orbit-focus"
main = "api/cloudflare/index.ts"
compatibility_date = "2025-12-01"

[assets]
directory = "client/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[dev]
port = 8787

[[d1_databases]]
binding = "DB"
database_name = "orbit-focus-db"
database_id = "YOUR_DATABASE_ID_HERE"

[vars]
NODE_ENV = "production"
